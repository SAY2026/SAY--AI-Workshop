let L='zh', S=0;

function setL(l,btn){
  L=l; S=0;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function go(d){S=Math.max(0,Math.min(3,S+d));render();}

function render(){
  const c=C[L], sec=c.secs[S];
  document.getElementById('brand-sub').textContent=c.brandSub;
  document.getElementById('bn').textContent=c.name;
  document.getElementById('bt').textContent=c.intro;
  document.getElementById('av-label').innerHTML=c.avlabel.replace('\n','<br>');
  const pct=Math.round(((S+1)/4)*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pm').textContent=c.secLabel+(S+1)+c.secOf;
  document.getElementById('bprev').disabled=S===0;
  document.getElementById('bnext').disabled=S===3;
  document.getElementById('bprev').textContent=c.prev;
  document.getElementById('bnext').textContent=c.next;

  let h='';
  c.secs.forEach((s,i)=>{
    h+=`<div class="sec-card${i===S?' on':''}" onclick="S=${i};render()">
      <div class="sec-head"><div class="sec-num">${s.num}</div><div class="sec-title">${s.title}</div></div>`;
    if(i===S){
      h+=`<div class="sec-body">${s.body}</div>`;
      if(s.oils){
        h+='<div class="oils">';
        s.oils.forEach(o=>{h+=`<div class="oil ${o.t}"><div class="oil-t">${o.h}</div><div class="oil-d">${o.d}</div></div>`;});
        h+='</div>';
      }
      if(s.tl){
        h+=`<div class="tl"><div class="tl-h"><div>${s.tl.h[0]}</div><div>${s.tl.h[1]}</div><div>${s.tl.h[2]}</div></div>`;
        s.tl.r.forEach(r=>{h+=`<div class="tl-r"><div class="tl-s">${r[0]}</div><div class="tl-d">${r[1]}</div><div class="tl-d">${r[2]}</div></div>`;});
        h+='</div>';
      }
      if(s.hi) h+=`<div class="hbox">${s.hi}</div>`;
      if(s.fire) h+=`<div class="fire">${s.fire}</div><div class="pbox">${s.prompt}</div>`;
    }
    h+='</div>';
  });
  document.getElementById('sw').innerHTML=h;
}
render();
</script>
</body>
</html>
